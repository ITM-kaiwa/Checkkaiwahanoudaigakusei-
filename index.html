<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQー会話チェック反応（大学生向け）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for multi-select and improved aesthetics */
        select[multiple] {
            height: 150px;
            width: 200px;
            background-color: #f9fafb;
            border-radius: 0.5rem;            padding: 0.5rem;
        }
        select[multiple] option {
            padding: 0.25rem;
        }
        select[multiple] option:checked {
            background-color: #4f46e5;
            color: white;
        }
        .gradient-bg {
            background: linear-gradient(to bottom right, #e0f2fe, #e0e7ff);
        }
        .question-card {
            transition: all 0.3s ease;
        }
        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid #E0E4EA;
            color: #6B7280;
            font-size: 0.9em;
            font-family: 'Roboto', sans-serif;
        }
        /* PCの標準スピンボタン（トグル）を非表示にしてデザインを統一 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="gradient-bg font-sans min-h-screen">
    <div class="container mx-auto p-6">
        <h1 class="text-4xl font-extrabold text-center text-indigo-800 mb-8">IQー会話チェック反応（大学生向け）</h1>
        
        <div class="mb-4 flex flex-wrap justify-center items-center gap-4">
            <button id="playAllBtn" class="bg-teal-500 text-white px-6 py-3 rounded-lg hover:bg-teal-600 transition duration-200 shadow-md font-medium">Chọn tất cả</button>
            <button id="playLessonBtn" class="bg-indigo-500 text-white px-6 py-3 rounded-lg hover:bg-indigo-600 transition duration-200 shadow-md font-medium">Chọn bài</button>
        </div>

        <div class="mb-8 flex flex-col items-center">
            <label for="pauseInput" class="text-sm font-medium text-gray-600 mb-1">Khoảng dừng (giây):</label>
            <div class="flex items-center">
                <div class="bg-white p-1 rounded-lg shadow-sm border border-gray-200 flex items-center">
                    <button id="minusBtn" class="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-l-md transition duration-150 active:scale-95 select-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15"></path></svg>
                    </button>
                    <input type="number" id="pauseInput" value="3" min="0" max="30" class="w-16 h-10 border-y border-transparent text-center focus:outline-none font-bold text-xl text-indigo-700 bg-white" readonly>
                    <button id="plusBtn" class="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-r-md transition duration-150 active:scale-95 select-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
                    </button>
                </div>

                <button id="stopBtn" class="ml-3 h-12 bg-red-500 text-white px-6 rounded-lg hover:bg-red-600 transition duration-200 shadow-md font-medium flex items-center justify-center active:scale-95">
                    Dừng
                </button>
            </div>
        </div>

        <div id="lessonSelectContainer" class="hidden mb-8 flex justify-center space-x-4">
            <select id="lessonSelect" multiple class="border border-gray-300 focus:ring-2 focus:ring-indigo-500">
            </select>
            <button id="confirmBtn" class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition duration-200 shadow-md">Hiển thị</button>
        </div>

        <div id="errorMessage" class="hidden text-red-600 text-center mb-6 bg-red-100 p-3 rounded-lg"></div>

        <div id="questionsContainer" class="space-y-6"></div>
    </div>

    <footer>
        <p>© 2026 Tài liệu kiểm tra | Thiết kế bởi Thuận / Jyotaro, Ver2.60</p>
    </footer>

    <script>
        // Sample question data
        const questions = [
            // 1. Tên
            {
                 "lesson": 1,
                 "id": "1-1a",
                 "text": "おなまえは なんですか。/ なまえを いってください/ おしえてください。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.1a.mp3"
             },
            {
                 "lesson": 1,
                 "id": "1-1b",
                 "text": "おなまえは なんですか。/ なまえを いってください/ おしえてください。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.1b.mp3"
             },
            // 2. Tuổi
            {
                 "lesson": 1,
                 "id": "1-2a",
                 "text": "おいくつ ですか。/ なんさい ですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.2a.mp3"
             },
            {
                 "lesson": 1,
                 "id": "1-2b",
                 "text": "おいくつ ですか。/ なんさい ですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.2b.mp3"
             },
            // 3. Đại học
            {
                 "lesson": 1,
                 "id": "1-3",
                 "text": "だいがくは どちらですか/どこですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.3.mp3"
             },
            // 4. Năm học
            {
                 "lesson": 1,
                 "id": "1-4",
                 "text": "いま、なんねんせいですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.4.mp3"
             },
            // 5. Chuyên ngành
            {
                 "lesson": 1,
                 "id": "1-5a",
                 "text": "せんもんは なんですか/ せんこう（専攻）は なんですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.5a.mp3"
             },
            {
                 "lesson": 1,
                 "id": "1-5b",
                 "text": "せんもんは なんですか/ せんこう（専攻）は なんですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.5b.mp3"
             },
            // 6. Là sinh viên / kỹ sư / du học sinh
            {
                 "lesson": 1,
                 "id": "1-6a",
                 "text": "〇〇さんは、だいがくせい/エンジニア/ 留学生 ですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.6a.mp3"
             },
            {
                 "lesson": 1,
                 "id": "1-6b",
                 "text": "〇〇さんは、だいがくせい/エンジニア/ <ruby>留学生<rt>りゅうがくせい</rt></ruby> ですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.6b.mp3"
             },
            // 7. Năm học (1~4 năm)
            {
                 "lesson": 1,
                 "id": "1-7a",
                 "text": "○○さんは、1ねんせい/2ねんせい/3ねんせい/4ねんせい ですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.7a.mp3"
             },
            {
                 "lesson": 1,
                 "id": "1-7b",
                 "text": "○○さんは、1ねんせい/2ねんせい/3ねんせい/4ねんせい ですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.7b.mp3"
             },
            // 8. 1. Sinh viên trường nào
            {
                 "lesson": 1,
                 "id": "1-8",
                 "text": "〇〇さんは、△△だいがく/△△たんだいの がくせいですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.8.mp3"
             },
            // 9. Xuất thân / Quê quán
            {
                 "lesson": 1,
                 "id": "1-9",
                 "text": "しゅっしんは どちらですか/どこですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.9.mp3"
             },
            // 10. Quốc tịch
            {
                 "lesson": 1,
                 "id": "1-10a",
                 "text": "〇〇さんは ベトナムじん/ちゅうごくじん/かんこくじんですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.10a.mp3"
             },
            {
                 "lesson": 1,
                 "id": "1-10b",
                 "text": "〇〇さんは ベトナムじん/ちゅうごくじん/かんこくじんですか。",
                 "audioUrl": "https://itm-kaiwa.github.io/Checkkaiwahanoudaigakusei-/1.10b.mp3"
             }
        ];

        // Group questions by lesson
        const lessons = [...new Set(questions.map(q => q.lesson))].sort((a, b) => a - b);

        // Populate lesson select dropdown
        const lessonSelect = document.getElementById('lessonSelect');
        lessons.forEach(lesson => {
            const option = document.createElement('option');
            option.value = lesson;
            option.textContent = `Bài ${lesson}`;
            lessonSelect.appendChild(option);
        });

        // Render questions grouped by lesson (initially hidden)
        const questionsContainer = document.getElementById('questionsContainer');
        lessons.forEach(lesson => {
            const lessonDiv = document.createElement('div');
            lessonDiv.className = `lesson-div hidden bg-white p-6 rounded-lg shadow-md`;
            lessonDiv.dataset.lesson = lesson;
            lessonDiv.innerHTML = `<h2 class="text-2xl font-semibold text-indigo-700 mb-4">Bài ${lesson}</h2>`;
            const lessonQuestions = questions.filter(q => q.lesson === lesson);
            lessonQuestions.forEach(q => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-card flex items-center justify-between p-3 border-b border-gray-200';
                
                // 【仕様変更部分】デフォルトで問題文を非表示(hidden)にし、目隠し文を表示
                questionDiv.innerHTML = `
                    <div class="flex-1 mr-4">
                        <span class="text-lg text-gray-800 font-medium hidden question-text">${q.id}: ${q.text}</span>
                        <span class="text-lg text-gray-400 italic placeholder-text">${q.id}: (Nghe âm thanh)</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button class="view-text bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-md text-sm font-semibold hover:bg-indigo-100 transition duration-150 active:scale-95 select-none">
                            Xem
                        </button>
                        <button class="play-audio bg-teal-100 p-2 rounded-full hover:bg-teal-200 transition duration-200 active:scale-95">
                            <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15z"></path>
                            </svg>
                        </button>
                    </div>
                `;
                lessonDiv.appendChild(questionDiv);
            });
            questionsContainer.appendChild(lessonDiv);
        });

        // Audio playback logic
        let currentAudio = null;
        let isPlaying = false;
        let playbackQueue = [];
        let currentIndex = 0;
        let pauseTimeout = null;

        const pauseInput = document.getElementById('pauseInput');

        // 共通オーディオプレイヤーの初期化
        function initAudio() {
            if (!currentAudio) {
                currentAudio = new Audio();
                
                currentAudio.onended = () => {
                    isPlaying = false;
                    playNext();
                };

                currentAudio.onerror = () => {
                    isPlaying = false;
                    if (currentAudio && currentAudio.src && !currentAudio.src.endsWith('/') && currentAudio.src !== window.location.href) {
                        showError(`Error loading audio file: ${currentAudio.src}`);
                        playNext();
                    }
                };
            }
        }

        // スマホの自動再生制限をユーザーのタップ時に解除する関数
        function unlockAudio() {
            initAudio();
            try {
                currentAudio.play().then(() => {
                    currentAudio.pause();
                }).catch(() => {});
            } catch (e) {}
        }

        // 自作「＋」「ー」ボタンの処理
        document.getElementById('minusBtn').addEventListener('click', () => {
            initAudio();
            let val = parseInt(pauseInput.value) || 0;
            if (val > 0) pauseInput.value = val - 1;
        });

        document.getElementById('plusBtn').addEventListener('click', () => {
            initAudio();
            let val = parseInt(pauseInput.value) || 0;
            if (val < 30) pauseInput.value = val + 1;
        });

        // Error message display function
        const errorMessageDiv = document.getElementById('errorMessage');
        function showError(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.classList.remove('hidden');
            setTimeout(() => {
                errorMessageDiv.classList.add('hidden');
            }, 5000);
        }

        // 音声を実際に再生する関数
        function playAudio(url) {
            initAudio();
            try {
                currentAudio.src = url;
                currentAudio.play().then(() => {
                    isPlaying = true;
                }).catch(error => {
                    isPlaying = false;
                    showError(`Failed to play audio for ${url}: ${error.message}`);
                    playNext();
                });
            } catch (error) {
                isPlaying = false;
                showError(`Error initializing audio for ${url}: ${error.message}`);
            }
        }

        // 次のキューへ進む関数
        function playNext() {
            if (playbackQueue.length > 0 && currentIndex < playbackQueue.length - 1) {
                currentIndex++;
                const pauseSeconds = pauseInput ? parseFloat(pauseInput.value) || 0 : 3;

                pauseTimeout = setTimeout(() => {
                    if (playbackQueue.length > 0) {
                        playAudio(playbackQueue[currentIndex]);
                    }
                }, pauseSeconds * 1000);
            } else {
                currentIndex = 0;
                playbackQueue = [];
            }
        }

        // 質問表示・音声再生ボタン（イベントデリゲーションでまとめてキャッチ）
        questionsContainer.addEventListener('click', (event) => {
            // 1. 「Xem」ボタンが押されたとき
            const viewButton = event.target.closest('.view-text');
            if (viewButton) {
                initAudio(); // スマホ対策の動線確保
                const card = viewButton.closest('.question-card');
                const textNode = card.querySelector('.question-text');
                const placeholderNode = card.querySelector('.placeholder-text');
                
                if (textNode.classList.contains('hidden')) {
                    textNode.classList.remove('hidden');
                    placeholderNode.classList.add('hidden');
                    viewButton.textContent = 'Ẩn'; // ボタンテキストを「隠す」に変更
                    viewButton.classList.replace('bg-indigo-55', 'bg-gray-150');
                } else {
                    textNode.classList.add('hidden');
                    placeholderNode.classList.remove('hidden');
                    viewButton.textContent = 'Xem'; // ボタンテキストを「見る」に戻す
                    viewButton.classList.replace('bg-gray-150', 'bg-indigo-55');
                }
                return;
            }

            // 2. 個別音声ボタンが押されたとき
            const audioButton = event.target.closest('.play-audio');
            if (audioButton) {
                unlockAudio();
                if (pauseTimeout) clearTimeout(pauseTimeout);
                playbackQueue = [];
                currentIndex = 0;
                const url = audioButton.getAttribute('data-audio');
                playAudio(url);
            }
        });

        // 「Chọn bài」ボタンの処理
        const lessonSelectContainer = document.getElementById('lessonSelectContainer');
        document.getElementById('playLessonBtn').addEventListener('click', () => {
            unlockAudio();
            lessonSelectContainer.classList.remove('hidden');
            lessonSelect.focus();
        });

        // 「Hiển thị（確定）」ボタンの処理
        document.getElementById('confirmBtn').addEventListener('click', () => {
            unlockAudio();
            const selectedLessons = Array.from(lessonSelect.selectedOptions).map(option => parseInt(option.value));
            if (selectedLessons.length === 0) {
                showError('Please select at least one lesson.');
                return;
            }
            document.querySelectorAll('.lesson-div').forEach(div => {
                const lessonNum = parseInt(div.dataset.lesson);
                if (selectedLessons.includes(lessonNum)) {
                    div.classList.remove('hidden');
                } else {
                    div.classList.add('hidden');
                }
            });

            if (pauseTimeout) clearTimeout(pauseTimeout);
            playbackQueue = questions
                .filter(q => selectedLessons.includes(q.lesson))
                .map(q => q.audioUrl);
            currentIndex = 0;

            if (playbackQueue.length > 0) {
                playAudio(playbackQueue[currentIndex]);
            } else {
                showError('No audio files available for selected lessons.');
            }
            lessonSelectContainer.classList.add('hidden');
        });

        // 「Chọn tất cả」ボタンの処理
        document.getElementById('playAllBtn').addEventListener('click', () => {
            unlockAudio();
            document.querySelectorAll('.lesson-div').forEach(div => {
                div.classList.remove('hidden');
            });
            if (pauseTimeout) clearTimeout(pauseTimeout);
            playbackQueue = questions.map(q => q.audioUrl);
            currentIndex = 0;

            if (playbackQueue.length > 0) {
                playAudio(playbackQueue[currentIndex]);
            } else {
                showError('No audio files available.');
            }
            lessonSelectContainer.classList.add('hidden');
        });

        // 「Dừng」ボタンの処理
        document.getElementById('stopBtn').addEventListener('click', () => {
            if (pauseTimeout) clearTimeout(pauseTimeout); 
            
            if (currentAudio) {
                currentAudio.onerror = null; 
                currentAudio.pause();
                currentAudio.src = ""; 
                try { currentAudio.load(); } catch(e) {}
                
                currentAudio.onerror = () => {
                    isPlaying = false;
                    if (currentAudio && currentAudio.src && !currentAudio.src.endsWith('/') && currentAudio.src !== window.location.href) {
                        showError(`Error loading audio file: ${currentAudio.src}`);
                        playNext();
                    }
                };
            }
            
            isPlaying = false;
            playbackQueue = [];
            currentIndex = 0;
            errorMessageDiv.classList.add('hidden');
            lessonSelectContainer.classList.add('hidden');
        });
    </script>
</body>
</html>
